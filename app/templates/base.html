<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Online Boutique{% endblock %}</title>
  <style>
    :root {
      --ink: #2a2a2a;
      --muted: #6b6b6b;
      --line: #e6e2da;
      --accent: #b07e3b;
      --bg: #faf8f3;
      --success: #2d7a4f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
    }
    header {
      border-bottom: 1px solid var(--line);
      background: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .brand {
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 0.5px;
      text-decoration: none;
      color: var(--ink);
    }
    header .brand span { color: var(--accent); }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 24px;
      color: var(--muted);
      font-size: 13px;
    }
    .cart-link {
      position: relative;
      text-decoration: none;
      color: var(--ink);
      font-size: 14px;
      padding: 6px 14px;
      border: 1px solid var(--line);
      border-radius: 4px;
      transition: border-color 0.15s ease;
    }
    .cart-link:hover { border-color: var(--accent); }
    .cart-count {
      display: inline-block;
      background: var(--accent);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 6px;
      vertical-align: 1px;
    }
    main { max-width: 1100px; margin: 0 auto; padding: 32px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 28px;
    }
    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }
    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #efeae0;
    }
    .card-body { padding: 14px 16px; }
    .card-name { font-weight: 500; margin-bottom: 4px; }
    .card-price { color: var(--muted); font-size: 14px; }
    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }
    .product-detail img {
      width: 100%;
      border-radius: 6px;
      background: #efeae0;
    }
    .product-detail h1 { margin-top: 0; }
    .product-detail .price {
      font-size: 22px;
      color: var(--accent);
      margin: 12px 0 20px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }
    .btn-secondary:hover { border-color: var(--ink); opacity: 1; }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }
    .back-link:hover { color: var(--ink); }
    .cart-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
    }
    .cart-table th, .cart-table td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--line);
    }
    .cart-table th {
      background: #f5f1ea;
      font-weight: 500;
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .cart-table tr:last-child td { border-bottom: none; }
    .cart-table img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      vertical-align: middle;
      margin-right: 14px;
    }
    .cart-total {
      text-align: right;
      font-size: 22px;
      margin: 24px 0;
    }
    .cart-total .label { color: var(--muted); font-size: 14px; margin-right: 12px; }
    .cart-total .amount { color: var(--accent); font-weight: 600; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state h2 { color: var(--ink); margin-bottom: 8px; }
    .confirmation {
      max-width: 560px;
      margin: 40px auto;
      text-align: center;
      background: white;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 48px 32px;
    }
    .confirmation .check {
      font-size: 48px;
      color: var(--success);
      margin-bottom: 16px;
    }
    .confirmation h1 { margin: 0 0 8px; }
    .confirmation .order-id {
      font-family: ui-monospace, "Cascadia Code", Menlo, monospace;
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 14px;
      color: var(--accent);
    }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 32px 0;
    }
    .inline-form { display: inline; }
    .text-link-button {
      background: none;
      border: none;
      color: var(--muted);
      text-decoration: underline;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }
    .text-link-button:hover { color: var(--ink); }
    @media (max-width: 640px) {
      .product-detail { grid-template-columns: 1fr; }
      header { padding: 14px 20px; }
      .nav-right { gap: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">Online <span>Boutique</span></a>
    <div class="nav-right">
      <span>CS6620 Cloud Project</span>
      <a class="cart-link" href="/cart">
        Cart{% if cart_count %}<span class="cart-count">{{ cart_count }}</span>{% endif %}
      </a>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Deployed on Google Cloud Platform &middot; images served from Cloud Storage</footer>
</body>
</html>
